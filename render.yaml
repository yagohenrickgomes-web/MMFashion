services:
  - type: web
    name: mm-fashion
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "gunicorn --chdir backend app:app"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mmfashion-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: mmfashion-db
    plan: free
