    <div class="content">

        <div>
          <h1>Pedidos</h1>
          <p>Acompanhe, filtre e gerencie todos os pedidos da loja.</p>

      </div>

      <div class="panel reveal"><div id="crudMount"></div></div>

  </div>

<script src="/assets/js/admin-crud.js"></script>
<script>
/* ============================================================
   SESSÃO / LOGOUT
   ============================================================ */
(async function checkSession(){
  try {
    const res = await fetch('/api/me', { credentials: 'include' });
    const data = await res.json();
    if (data.autenticado) {
      document.getElementById('userName').textContent = data.nome;
      document.getElementById('userAvatar').textContent = data.nome.charAt(0).toUpperCase();
      document.getElementById('userRole').textContent = 'Administradora';
    } else {
      window.location.href = '/login';
    }
  } catch (e) {
    console.warn('Não foi possível verificar a sessão.', e);
  }
})();

document.getElementById('btnLogout').addEventListener('click', async () => {
  try {
    await fetch('/api/logout', { method: 'POST', credentials: 'include' });
  } finally {
    window.location.href = '/login';
  }
});

/* ============================================================
   SIDEBAR COLLAPSE
   ============================================================ */
const sidebar = document.getElementById('sidebar');
document.getElementById('collapseBtn').addEventListener('click', () => {
  if (window.innerWidth <= 900) {
    sidebar.classList.toggle('mobile-open');
  } else {
    sidebar.classList.toggle('collapsed');
  }
});

document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelector('.nav-item.active')?.classList.remove('active');
    item.classList.add('active');
    document.querySelector('.breadcrumb strong').textContent = '/ ' + item.dataset.page;
  });
});

/* ============================================================
   REVEAL ANIMATION
   ============================================================ */
const io = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('is-visible'); io.unobserve(e.target); } });
}, { threshold: .1 });
document.querySelectorAll('.reveal').forEach(el => io.observe(el));


/* ============================================================
   PEDIDOS
   ============================================================ */
AdminCRUD.init({
  storageKey: 'pedidos',
  title: 'Pedidos',
  itemLabel: 'Pedido',
  subtitle: 'Acompanhe e atualize o status de cada venda',
  searchable: true,
  mountId: 'crudMount',
  columns: [
    { key:'numero', label:'Pedido' },
    { key:'cliente', label:'Cliente' },
    { key:'total', label:'Total', render:(i)=> 'R$ ' + AdminCRUD.money(i.total) },
    { key:'status', label:'Status', render:(i)=> {
        const cores = { 'Processando':'#a8823f', 'Pago':'#4CAF50', 'Em Trânsito':'#C8A96A', 'Entregue':'#4CAF50', 'Cancelado':'#D64545' };
        const cor = cores[i.status] || '#777';
        return `<span style="font-size:11px;font-weight:600;padding:5px 12px;border-radius:100px;background:${cor}22;color:${cor};">${i.status}</span>`;
      }},
    { key:'data', label:'Data' },
  ],
  fields: [
    { key:'numero', label:'Número do pedido', required:true },
    { key:'cliente', label:'Cliente', required:true },
    { key:'total', label:'Total (R$)', type:'number', required:true },
    { key:'status', label:'Status', type:'select', options:['Processando','Pago','Em Trânsito','Entregue','Cancelado'] },
    { key:'data', label:'Data', type:'date' },
  ],
  sampleData: [
    { numero:'#MMF-2481', cliente:'Marina Costa', total:389.90, status:'Entregue', data:'2026-07-10' },
    { numero:'#MMF-2480', cliente:'Juliana Prado', total:219.90, status:'Em Trânsito', data:'2026-07-12' },
    { numero:'#MMF-2479', cliente:'Beatriz Lima', total:899.00, status:'Processando', data:'2026-07-13' },
  ],
});
</script>
